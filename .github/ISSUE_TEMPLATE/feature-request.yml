name: Feature request
description: Propose a new feature or capability for TabTab.
title: "[Feature] "
labels: ["type:feature", "status:new"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature! Please describe what you want and why.
        Larger features may be decomposed into multiple stories during `/plan-feature`.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want TabTab to do that it doesn't already?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you have a specific idea for how this could work, share it.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you discarded them.
  - type: dropdown
    id: component
    attributes:
      label: Primary component
      description: Which part of TabTab would this change?
      options:
        - Builder (C++ app)
        - Code generator
        - Output framework
        - Documentation
        - Infrastructure / CI
        - Cross-cutting
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Sketches, mock-ups, similar features in other tools.
